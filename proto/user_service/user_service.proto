syntax = "proto3";

package user_service;

option go_package = "services/user_service/generated";

service UserService {
  rpc CreateUser(RegisterData) returns (GetDataResponse);
  rpc LoginUser(UserData) returns (GetTokenResponse);
  rpc GetData(GetDataRequest) returns (GetDataResponse);
  rpc UpdateName(UpdateNameRequest) returns (DefaultResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (DefaultResponse);
  rpc UpdateEmail(UpdateEmailRequest) returns (DefaultResponse);
  rpc RefreshToken(Token) returns (GetTokenResponse);
}

message RegisterData {
  UserData user_data = 1;
}

message UserData {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
}

message Token {
  string access_token = 1;
  string refresh_token = 2;
}

message GetDataRequest {
  string user_id = 1;
}

message GetDataResponse {
  User user = 1;
}

message UpdateNameRequest {
  optional string first_name = 2;
  optional string last_name = 3;
}

message DefaultResponse {
  string message = 1;
}

message UpdateEmailRequest {
  string email = 1;
}

message UpdatePasswordRequest {
  string password = 1;
}

message GetTokenResponse {
  Token token = 1;
}
